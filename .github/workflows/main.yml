name: 24/7 Dual-Stream (Fixed Names)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart_stream]

env:
  # Node.js ki warning hatane ke liye
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 355 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt update
          sudo apt install -y ffmpeg

      - name: Check Media Files
        run: |
          # File names strictly changed to video.mp4 and audio.mp3
          if [ ! -f "video.mp4" ] || [ ! -f "audio.mp3" ]; then 
            echo "Error: video.mp4 or audio.mp3 not found in repository!" 
            exit 1
          fi

      - name: Start 2 Live Streams
        env:
          STREAM_URL: ${{ secrets.STREAM_URL }}
          STREAM_2_URL: ${{ secrets.STREAM_2_URL }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "Starting streams with video.mp4 and audio.mp3..."

          # Stable settings for 24/7 stream
          FF_COMMON="-re -stream_loop -1 -i video.mp4 -stream_loop -1 -i audio.mp3 \
          -map 0:v:0 -map 1:a:0 -c:v libx264 -preset ultrafast -tune zerolatency \
          -pix_fmt yuv420p -b:v 2000k -c:a aac -b:a 128k -t 05:45:00 -f flv"

          # Pehli stream (STREAM_URL)
          ffmpeg $FF_COMMON "$STREAM_URL" &
          
          # Doosri stream (STREAM_2_URL)
          ffmpeg $FF_COMMON "$STREAM_2_URL" &

          # Wait taaki dono background process chalti rahein
          wait

          echo "Duration complete. Re-triggering..."
          curl -X POST -H "Authorization: token $GH_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/dispatches \
          -d '{"event_type": "restart_stream"}'
